decorators:
  - name: network-intel
    schema:
      $id: network-intel
      $schema: https://json-schema.org/draft/202012/schema
      type: object
      required:
        - target
      properties:
        target:
          type: string
          description: "Hostname or IP address to inspect"
          examples:
            - "google.com"
            - "8.8.8.8"
            - "github.com"
        checks:
          type: string
          description: "Comma-separated list of checks to run"
          default: "dns,ping,ports,geo,tls"
          examples:
            - "dns,ping,ports,geo,tls"
            - "dns,ping"
            - "ports,tls"
        timeout:
          type: string
          description: "Per-check timeout in seconds (1-30)"
          default: "5"
          examples:
            - "5"
            - "10"
      additionalProperties: false

repositories:
  - name: iag-skill-demo
    url: git@github.com:keepithuman/iag-skill-demo.git
    reference: main

services:
  - name: network-intel
    type: python-script
    description: >
      DNS resolution, ping reachability, port scan, geolocation, and TLS
      certificate inspection for any hostname or IP. Returns a structured
      JSON report — useful for pre-flight checks, incident triage, and
      network discovery workflows.
    filename: main.py
    working-directory: network-intel
    repository: iag-skill-demo
    decorator: network-intel
    tags:
      - network
      - discovery
      - demo
    runtime:
      req-file: requirements.txt
